name: Claude Agent Fix

on:
  issues:
    types: [labeled]

jobs:
  claude-fix:
    name: Apply Claude automated fix
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude fix skill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --headless "/fix-bug"

      - name: Create fix branch and commit
        id: commit
        run: |
          BRANCH="claude-fix/issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — Claude may have found no fix needed."
            echo "branch=" >> $GITHUB_OUTPUT
          else
            git commit -m "fix: Claude automated fix for issue #${{ github.event.issue.number }}

            Co-Authored-By: Claude Code <noreply@anthropic.com>"
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Open pull request
        id: pr
        if: steps.commit.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "fix: Claude automated fix for issue #${{ github.event.issue.number }}" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated fix generated by Claude Code for issue #${{ github.event.issue.number }}.

          ## Linked Issue

          Closes #${{ github.event.issue.number }}

          ## Checklist

          - [ ] Tests pass
          - [ ] No secrets committed
          EOF
          )" \
            --head "${{ steps.commit.outputs.branch }}" \
            --base main)
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment on issue with PR link
        if: steps.commit.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code has analysed this issue and opened a fix PR: ${{ steps.pr.outputs.url }}"

      - name: Comment if no fix was produced
        if: steps.commit.outputs.branch == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Claude Code ran the \`/fix-bug\` skill but produced no file changes. Manual investigation may be needed."
